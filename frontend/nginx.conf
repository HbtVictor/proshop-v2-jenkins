# Configuration Nginx interne au conteneur frontend.
# Sert le bundle React statique. Le routing client-side (React Router) est
# géré en redirigeant toute route inconnue vers /index.html.
# Les appels /api ne passent PAS ici — c'est le Nginx reverse proxy en
# amont (P.4) qui les route vers le backend.

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache long pour les assets fingerprintés (react-scripts ajoute un hash
  # dans le nom de fichier, donc on peut cacher agressivement).
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fallback SPA : si la route demandée n'existe pas en tant que fichier,
  # on renvoie index.html pour que React Router prenne le relais.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
