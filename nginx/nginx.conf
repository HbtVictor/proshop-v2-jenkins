# ═════════════════════════════════════════════════════════════
#  Nginx reverse proxy — unique point d'entrée de la stack
#  ProShop v2. Écoute sur le port 80 et route vers les conteneurs
#  internes via le DNS Docker (`frontend:3000`, `backend:5000`).
# ═════════════════════════════════════════════════════════════

# Upstreams : on déclare explicitement les services internes pour
# pouvoir les référencer plus bas. Le DNS Docker résout `frontend`
# et `backend` vers les bonnes IPs des conteneurs.
upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:5000;
}

server {
  listen 80;
  server_name _;

  # Taille max des requêtes POST (upload d'image produit via Multer)
  client_max_body_size 10M;

  # ────────────────────────────────────────────────────
  #  /api/*  →  backend Node/Express
  # ────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend_upstream;

    # Headers de traçabilité — permettent au backend de connaître
    # l'IP réelle du client (sinon il ne voit que l'IP du proxy Nginx).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pour les éventuels endpoints WebSocket / streams longs
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }

  # ────────────────────────────────────────────────────
  #  /uploads/*  →  backend (sert les images produit)
  # ────────────────────────────────────────────────────
  location /uploads/ {
    proxy_pass http://backend_upstream;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ────────────────────────────────────────────────────
  #  /  →  frontend React (Nginx interne du conteneur)
  #  Doit être en DERNIER (catch-all pour le SPA).
  # ────────────────────────────────────────────────────
  location / {
    proxy_pass http://frontend_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
