# Docker Compose — Stack ProShop v2
#
# 4 services + 1 volume + 1 réseau dédié.
# Seul Nginx (port 80) est exposé à l'extérieur. Frontend et backend
# sont uniquement joignables depuis le réseau Docker interne via Nginx.

services:
  # ───────────────────────────────────────────────────────────
  #  MongoDB — stockage persistant via volume nommé.
  #  Port 27017 NON publié → joignable uniquement sur proshop-net.
  # ───────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: proshop-mongo
    restart: unless-stopped
    networks:
      - proshop-net
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ───────────────────────────────────────────────────────────
  #  Backend Node/Express — attend mongo healthy.
  #  Port 5000 NON publié (P.4) — joignable via Nginx uniquement.
  # ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: proshop-backend:local
    container_name: proshop-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - proshop-net
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/proshop}

  # ───────────────────────────────────────────────────────────
  #  Frontend React (Nginx interne sert le bundle statique).
  #  Port 3000 NON publié (P.4) — joignable via Nginx uniquement.
  # ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: proshop-frontend:local
    container_name: proshop-frontend
    restart: unless-stopped
    networks:
      - proshop-net

  # ───────────────────────────────────────────────────────────
  #  Nginx reverse proxy — SEUL point d'entrée public (port 80).
  #  Route :  /api/*     → backend
  #           /uploads/* → backend
  #           /          → frontend
  # ───────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: proshop-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-net
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo-data:
    name: proshop-mongo-data

networks:
  proshop-net:
    name: proshop-net
    driver: bridge
